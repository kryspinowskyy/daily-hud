<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DAILY_HUD | Taktyczny Planer Przetrwania</title>
    <link href="https://fonts.googleapis.com/css2?family=Audiowide&family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="apple-touch-icon" href="logo.png">

    <style>
        :root {
            --bg-light: #f0f4f8; --card-light: #ffffff; --text-light: #1a2b3c; --text-dim-light: #7f8c9d; --border-light: #dbe2e8; --row-hover-light: #f1f5f9; --week-bg-light: #e6f7f7;
            --bg: #0a0f14; --card: #121a21; --text: #e0e6ed; --text-dim: #64748b; --border: #1e293b; --row-hover: #1a242f; --week-bg: #0f2027;
            --primary: #008080; --primary-glow: rgba(0, 128, 128, 0.3); --tracker: #8e44ad; --bad: #e67e22; 
        }

        [data-theme="light"] { --bg: var(--bg-light); --card: var(--card-light); --text: var(--text-light); --text-dim: var(--text-dim-light); --border: var(--border-light); --row-hover: var(--row-hover-light); --week-bg: var(--week-bg-light); }

        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 12px; min-height: 100vh; -webkit-font-smoothing: antialiased; transition: background-color 0.3s, color 0.3s; }
        body::before { content: " "; display: block; position: fixed; top: 0; left: 0; bottom: 0; right: 0; background-image: linear-gradient(0deg, rgba(255,255,255,0.05) 50%, transparent 50%); z-index: 9999; background-size: 100% 4px; pointer-events: none; opacity: 0.1; }
        #watermark { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) rotate(-20deg); font-size: 10vw; font-weight: 900; color: var(--primary); opacity: 0.05; white-space: nowrap; z-index: -1; pointer-events: none; font-family: 'Audiowide', sans-serif; }

        header { padding: 10px 0; display: flex; justify-content: space-between; align-items: flex-end; border-bottom: 2px solid var(--border); margin-bottom: 15px; background: var(--card); padding: 15px; border-radius: 8px; transition: 0.3s;}
        .logo { font-family: 'Audiowide', sans-serif; font-size: 1.2rem; letter-spacing: 1px; color: var(--primary); text-shadow: 1px 1px 2px rgba(0,0,0,0.1); }
        .user-level { text-align: right; }
        .lvl-text { font-family: 'Orbitron'; font-size: 0.7rem; color: var(--text-dim); }
        .lvl-val { font-family: 'Audiowide'; font-size: 1.4rem; color: var(--text); text-shadow: 0 0 5px var(--primary-glow); }

        .progress-container { width: 100%; background: var(--border); height: 10px; margin-bottom: 15px; border-radius: 5px; overflow: hidden; border: 1px solid var(--border); }
        .progress-bar { height: 100%; background: var(--primary); width: 0%; transition: width 0.8s ease; box-shadow: 0 0 10px var(--primary-glow); }

        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; gap: 8px; }
        .btn-action, .btn-icon { background: var(--card); color: var(--primary); border: 1px solid var(--primary); padding: 10px 12px; font-family: 'Orbitron'; font-size: 0.7rem; cursor: pointer; font-weight: 700; text-transform: uppercase; transition: 0.2s; border-radius: 5px; clip-path: polygon(5px 0, 100% 0, 100% calc(100% - 5px), calc(100% - 5px) 100%, 0 100%, 0 5px); white-space: nowrap; text-align: center; }
        .btn-action:hover, .btn-icon:hover { background: var(--primary); color: #fff; box-shadow: 0 0 10px var(--primary-glow); }
        select.btn-action { appearance: none; padding-right: 5px; text-align-last: center; outline: none; }

        .table-container { background: var(--card); border: 1px solid var(--border); position: relative; max-height: 52vh; overflow: hidden; display: flex; flex-direction: column; border-radius: 8px; clip-path: polygon(0 0, 100% 0, 100% calc(100% - 10px), calc(100% - 10px) 100%, 0 100%); }
        .scroll-area { overflow: auto; scroll-behavior: smooth; flex-grow: 1;}
        table { width: 100%; border-collapse: collapse; min-width: 650px; }
        th { background: var(--card); padding: 15px 5px; font-size: 0.6rem; color: var(--text-dim); text-transform: uppercase; border-bottom: 2px solid var(--border); position: sticky; top: 0; z-index: 5; font-family: 'Orbitron'; }
        td { padding: 12px 5px; border-bottom: 1px solid var(--border); text-align: center; }
        tr:hover td { background: var(--row-hover); }
        .sticky-col { position: sticky; left: 0; background: var(--card) !important; border-right: 1px solid var(--border) !important; font-family: 'Orbitron'; font-weight: 700; color: var(--text); z-index: 6; }
        th.sticky-col { z-index: 10; color: var(--primary);} 
        .sticky-col span { font-size: 0.45rem; color: var(--primary); display: block; font-family: 'Inter'; margin-top:2px;}
        .weekly-row { background: var(--week-bg) !important; font-size: 0.6rem; color: var(--text); font-weight: 800; font-family: 'Orbitron'; }
        .weekly-row td { padding: 8px; border-top: 1px solid var(--primary); border-bottom: 1px solid var(--primary); color: var(--primary); }

        input[type="checkbox"] { appearance: none; width: 26px; height: 26px; border: 2px solid var(--text-dim); background: transparent; cursor: pointer; position: relative; border-radius: 6px; clip-path: polygon(3px 0, 100% 0, 100% calc(100% - 3px), calc(100% - 3px) 100%, 0 100%, 0 3px); }
        input[type="checkbox"]:checked { background: var(--primary); border-color: var(--primary); }
        input[type="checkbox"]:checked::after { content: "✓"; color: #fff; position: absolute; left: 7px; top: 3px; font-weight: 900; }
        .type-bad:checked { background: var(--bad); border-color: var(--bad); }
        .type-tracker:checked { background: var(--tracker); border-color: var(--tracker); }
        .type-tracker:checked::after { content: "■"; font-size: 12px; left: 8px; top: 7px;}

        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(90px, 1fr)); gap: 12px; margin-top: 15px; }
        .stat-card { background: var(--card); border: 1px solid var(--border); padding: 15px 5px; text-align: center; clip-path: polygon(8px 0, 100% 0, 100% calc(100% - 8px), calc(100% - 8px) 100%, 0 100%, 0 8px); border-bottom: 3px solid var(--border); border-radius: 5px; }
        .stat-card.active-streak { border-bottom-color: var(--primary); box-shadow: 0 5px 15px var(--primary-glow); }
        .stat-val { font-family: 'Audiowide'; font-size: 1.4rem; color: var(--text);}
        .stat-label { font-size: 0.45rem; color: var(--text-dim); text-transform: uppercase; margin-top: 8px; display: block; font-family: 'Orbitron';}
        .streak-fire { color: var(--primary); font-size: 0.6rem; margin-top: 5px; font-weight: 800; }

        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 10000; padding: 15px; align-items: center; justify-content: center; backdrop-filter: blur(3px);}
        .modal-box { background: var(--card); border: 1px solid var(--border); padding: 25px; width: 100%; max-width: 450px; max-height: 90vh; overflow-y: auto; clip-path: polygon(15px 0, 100% 0, 100% calc(100% - 15px), calc(100% - 15px) 100%, 0 100%, 0 15px); border-radius: 10px; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px solid var(--border); padding-bottom: 15px;}
        .modal-title { margin: 0; font-family: 'Audiowide'; color: var(--primary); font-size: 1rem;}
        .close-btn { background: none; border: none; color: var(--text-dim); font-size: 1.5rem; cursor: pointer; font-family: 'Orbitron'; }
        
        textarea, input[type="text"], select.form-select { width: 100%; box-sizing: border-box; background: var(--bg); color: var(--text); border: 1px solid var(--border); padding: 12px; margin-bottom: 15px; outline: none; font-family: 'Orbitron'; font-size: 0.8rem; border-radius: 5px; }
        textarea { height: 120px; resize: vertical; }

        #toast { position: fixed; bottom: -100px; left: 50%; transform: translateX(-50%); background: var(--primary); color: #fff; padding: 15px 30px; font-family: 'Audiowide'; font-size: 0.8rem; transition: 0.4s; z-index: 9999; clip-path: polygon(10px 0, 100% 0, 100% calc(100% - 10px), calc(100% - 10px) 100%, 0 100%, 0 10px); border-radius: 5px; }
        #toast.show { bottom: 30px; }
        .note-dot { width: 6px; height: 6px; background: var(--primary); margin: 3px auto 0; display: none; }
        .has-note .note-dot { display: block; }

        /* HEATMAPA & ODZNAKI */
        .heat-grid { display: flex; flex-wrap: wrap; gap: 3px; justify-content: center; margin-top: 15px; }
        .heat-box { width: 12px; height: 12px; border-radius: 2px; background: var(--border); }
        .heat-lvl-1 { background: rgba(0, 128, 128, 0.3); }
        .heat-lvl-2 { background: rgba(0, 128, 128, 0.7); }
        .heat-lvl-3 { background: var(--primary); box-shadow: 0 0 5px var(--primary-glow);}
        
        .badge-row { display: flex; align-items: center; gap: 15px; padding: 10px; border: 1px solid var(--border); margin-bottom: 10px; border-radius: 8px; background: var(--bg);}
        .badge-ico { font-size: 2rem; filter: grayscale(100%); opacity: 0.3; transition: 0.3s; }
        .badge-row.unlocked .badge-ico { filter: grayscale(0%); opacity: 1; }
        .badge-row.unlocked { border-color: var(--primary); box-shadow: 0 0 10px var(--primary-glow); }
        .badge-title { font-family: 'Orbitron'; font-size: 0.8rem; font-weight: 700; color: var(--text); }
        .badge-desc { font-size: 0.6rem; color: var(--text-dim); }

    </style>
</head>
<body data-theme="dark">

    <div id="watermark">SYS.2026</div>

    <header>
        <div class="logo">DAILY_HUD <br><span style="font-size: 0.5rem; color: var(--text-dim); font-family: 'Orbitron'">v5.0.ULTIMATE</span></div>
        <div class="user-level">
            <div class="lvl-text" id="ui-sys-lvl">POZIOM SYSTEMU</div>
            <div class="lvl-val" id="sys-lvl">01</div>
        </div>
    </header>

    <div class="progress-container">
        <div class="progress-bar" id="month-progress"></div>
    </div>

    <div class="top-bar">
        <button class="btn-icon" onclick="openSettings()" id="ui-config">[ OPCJE ]</button>
        <div style="display:flex; gap:5px; flex-grow:1;">
            <select id="month-select" class="btn-action" style="flex:2; padding:8px 2px;" onchange="changeDate()"></select>
            <select id="year-select" class="btn-action" style="flex:1; padding:8px 2px;" onchange="changeDate()"></select>
        </div>
        <button class="btn-action" onclick="scrollToToday()" id="ui-sync">DZISIAJ</button>
    </div>

    <div class="table-container">
        <div class="scroll-area" id="main-scroll">
            <table>
                <thead><tr id="thead"></tr></thead>
                <tbody id="tbody"></tbody>
            </table>
        </div>
    </div>

    <div class="stats-grid" id="stats-area"></div>
    
    <button class="btn-action" style="width:100%; margin-top:15px; border-style:dashed;" onclick="openProfile()" id="ui-profile-btn">[ RAPORT ROCZNY & ODZNAKI ]</button>

    <div id="toast">SYSTEM GOTOWY</div>

    <div id="modal-briefing" class="modal">
        <div class="modal-box" style="text-align: center; border-color: var(--primary); box-shadow: 0 0 30px var(--primary-glow);">
            <h2 style="font-family: 'Audiowide'; color: var(--primary); margin-top: 0;">PORANNY BRIEFING</h2>
            <div style="font-size: 3rem; margin: 15px 0;">🎯</div>
            <p id="briefing-text" style="font-size: 0.9rem; line-height: 1.5; color: var(--text); margin-bottom: 25px;">
                Analiza systemu zakończona. Masz dziś cele do zrealizowania. Utrzymaj dyscyplinę.
            </p>
            <button class="btn-action" style="width:100%; padding:15px;" onclick="closeModal('modal-briefing')">PRZYJĄŁEM (ZAMKNIJ)</button>
        </div>
    </div>

    <div id="modal-profile" class="modal">
        <div class="modal-box">
            <div class="modal-header">
                <h3 class="modal-title" id="ui-profile-title">AKTYWNOŚĆ ROCZNA</h3>
                <button class="close-btn" onclick="closeModal('modal-profile')">×</button>
            </div>
            
            <div style="text-align: center; font-family: 'Orbitron'; font-size: 0.7rem; color: var(--text-dim); margin-bottom: 5px;">MAPA AKTYWNOŚCI <span id="heatmap-year">2026</span></div>
            <div class="heat-grid" id="heatmap-container"></div>
            
            <div class="modal-header" style="margin-top: 30px;">
                <h3 class="modal-title">ODZNAKI TAKTYCZNE</h3>
            </div>
            <div id="badges-container"></div>
        </div>
    </div>

    <div id="modal-note" class="modal">
        <div class="modal-box">
            <div class="modal-header">
                <h3 class="modal-title" id="note-modal-title">RAPORT</h3>
                <button class="close-btn" onclick="closeModal('modal-note')">×</button>
            </div>
            <textarea id="note-input"></textarea>
            <button class="btn-action" style="width:100%; padding:15px;" onclick="saveNote()" id="ui-save-log">ZATWIERDŹ</button>
        </div>
    </div>

    <div id="modal-settings" class="modal">
        <div class="modal-box">
            <div class="modal-header">
                <h3 class="modal-title" id="ui-settings-title">USTAWIENIA</h3>
                <button class="close-btn" onclick="closeModal('modal-settings')">×</button>
            </div>
            
            <div style="display: flex; gap: 10px; margin-bottom: 20px;">
                <button class="btn-icon" style="flex:1;" onclick="toggleTheme()">MOTYW L/D</button>
                <button class="btn-icon" style="flex:1;" onclick="toggleLang()">JĘZYK PL/EN</button>
            </div>

            <div id="targets-editor"></div>
            <button class="btn-icon" style="width:100%; margin-bottom: 20px; border-style: dashed;" onclick="addNewTargetField()" id="ui-add-vector">+ DODAJ WEKTOR</button>
            <button class="btn-action" style="width:100%; padding:15px;" onclick="saveTargets()" id="ui-save-proto">ZAPISZ PROTOKÓŁ</button>

            <div class="modal-header" style="margin-top: 30px;"><h3 class="modal-title" id="ui-db-title">BAZA DANYCH</h3></div>
            <div style="display: flex; gap: 10px; margin-bottom:10px;">
                <button class="btn-icon" style="flex:1;" onclick="exportData()" id="ui-export">EKSPORT (JSON)</button>
                <button class="btn-icon" style="flex:1;" onclick="document.getElementById('import-file').click()" id="ui-import">IMPORT</button>
                <input type="file" id="import-file" style="display:none" accept=".json" onchange="importData(event)">
            </div>
            <button class="btn-action" style="width:100%; border-color: var(--tracker); color: var(--tracker);" onclick="exportCSV()" id="ui-csv">EKS. CSV (EXCEL)</button>
        </div>
    </div>

    <script>
        const TRANSLATIONS = {
            pl: {
                sys_lvl: "POZIOM SYSTEMU", config: "[ OPCJE ]", sync: "DZISIAJ", raport: "RAPORT DZIENNY", save_log: "ZATWIERDŹ LOG", settings: "USTAWIENIA", add_vector: "+ DODAJ WEKTOR", save_proto: "ZAPISZ PROTOKÓŁ", db: "BAZA DANYCH", export: "EKS. JSON", import: "IMPORT", csv: "EKS. CSV", ready: "SYSTEM GOTOWY", saved: "ZAPISANO", day: "Dzień", profile_btn: "[ RAPORT ROCZNY & ODZNAKI ]", profile_title: "RAPORT TAKTYCZNY",
                months: ["Styczeń", "Luty", "Marzec", "Kwiecień", "Maj", "Czerwiec", "Lipiec", "Sierpień", "Wrzesień", "Październik", "Listopad", "Grudzień"],
                briefing: "Witaj. Masz dziś <b>{N}</b> wektorów do odhaczenia. Utrzymaj dyscyplinę i zrób co do Ciebie należy."
            },
            en: {
                sys_lvl: "SYSTEM LEVEL", config: "[ SETTINGS ]", sync: "TODAY", raport: "DAILY REPORT", save_log: "SUBMIT LOG", settings: "SETTINGS", add_vector: "+ ADD VECTOR", save_proto: "SAVE PROTOCOL", db: "DATABASE", export: "EXP. JSON", import: "IMPORT", csv: "EXP. CSV", ready: "SYSTEM READY", saved: "SAVED", day: "Day", profile_btn: "[ YEARLY REPORT & BADGES ]", profile_title: "TACTICAL REPORT",
                months: ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"],
                briefing: "Welcome. You have <b>{N}</b> vectors to complete today. Maintain discipline and get it done."
            }
        };

        const BADGES_DEF = [
            { id: 'b_first', ico: '🔰', namePL: 'Rekrut', nameEN: 'Recruit', descPL: 'Rozpocznij korzystanie z systemu (Poziom 2)', descEN: 'Start using the system (Level 2)', reqLvl: 2 },
            { id: 'b_vet', ico: '🎖️', namePL: 'Weteran', nameEN: 'Veteran', descPL: 'Osiągnij Poziom 10', descEN: 'Reach Level 10', reqLvl: 10 },
            { id: 'b_term', ico: '🤖', namePL: 'Terminator', nameEN: 'Terminator', descPL: 'Osiągnij Poziom 50', descEN: 'Reach Level 50', reqLvl: 50 },
            { id: 'b_ghost', ico: '👻', namePL: 'Duch', nameEN: 'Ghost', descPL: 'Osiągnij Poziom 100', descEN: 'Reach Level 100', reqLvl: 100 }
        ];

        let currentLang = localStorage.getItem('cfg_lang') || 'pl';
        let targets = []; let currM = new Date().getMonth(); let currY = new Date().getFullYear();
        let activeNoteKey = ""; let globalExp = 0;

        function getShortY(y) { return (y || currY).toString().slice(-2); }

        function updateUIStrings() {
            const l = TRANSLATIONS[currentLang];
            document.getElementById('ui-sys-lvl').innerText = l.sys_lvl; document.getElementById('ui-config').innerText = l.config;
            document.getElementById('ui-sync').innerText = l.sync; document.getElementById('ui-settings-title').innerText = l.settings;
            document.getElementById('ui-add-vector').innerText = l.add_vector; document.getElementById('ui-save-proto').innerText = l.save_proto;
            document.getElementById('ui-db-title').innerText = l.db; document.getElementById('ui-export').innerText = l.export;
            document.getElementById('ui-import').innerText = l.import; document.getElementById('ui-csv').innerText = l.csv;
            document.getElementById('ui-profile-btn').innerText = l.profile_btn; document.getElementById('ui-profile-title').innerText = l.profile_title;
        }

        function toggleTheme() { const theme = document.body.getAttribute('data-theme') === 'dark' ? 'light' : 'dark'; document.body.setAttribute('data-theme', theme); localStorage.setItem('cfg_theme', theme); }
        function toggleLang() { currentLang = currentLang === 'pl' ? 'en' : 'pl'; localStorage.setItem('cfg_lang', currentLang); updateUIStrings(); renderDateSelectors(); renderTable(); }

        function boot() {
            document.body.setAttribute('data-theme', localStorage.getItem('cfg_theme') || 'dark');
            loadTargets(); updateUIStrings(); renderDateSelectors(); renderTable();
            checkBriefing();
            if(new Date().getMonth() === currM && new Date().getFullYear() === currY) setTimeout(scrollToToday, 500);
            setTimeout(() => triggerToast(TRANSLATIONS[currentLang].ready), 500);
        }

        function loadTargets() {
            const saved = localStorage.getItem('cfg_targets_26_clean');
            if (saved) { try { targets = JSON.parse(saved); } catch(e) { targets = [{id:'tr',ico:'🏋️',lab:'Trening',type:'good'},{id:'wo',ico:'💧',lab:'Woda',type:'good'}]; } } 
            else { targets = [{id:'tr',ico:'🏋️',lab:'Trening',type:'good'},{id:'wo',ico:'💧',lab:'Woda',type:'good'},{id:'su',ico:'💊',lab:'Suple',type:'good'},{id:'ro',ico:'📚',lab:'Rozwój',type:'good'},{id:'uz',ico:'🍺',lab:'Zło',type:'bad'}]; }
        }

        function checkBriefing() {
            const d = new Date();
            const todayKey = `briefing_shown_${d.getFullYear()}_${d.getMonth()}_${d.getDate()}`;
            if(!localStorage.getItem(todayKey)) {
                let goodTargetsCount = targets.filter(t => t.type === 'good').length;
                let txt = TRANSLATIONS[currentLang].briefing.replace('{N}', goodTargetsCount);
                document.getElementById('briefing-text').innerHTML = txt;
                document.getElementById('modal-briefing').style.display = 'flex';
                localStorage.setItem(todayKey, '1');
            }
        }

        function renderDateSelectors() {
            const mSel = document.getElementById('month-select'); const ySel = document.getElementById('year-select');
            mSel.innerHTML = ""; ySel.innerHTML = "";
            TRANSLATIONS[currentLang].months.forEach((m, i) => { const opt = document.createElement('option'); opt.value = i; opt.innerText = m.toUpperCase(); if(i === currM) opt.selected = true; mSel.appendChild(opt); });
            for(let y = 2024; y <= 2030; y++) { const opt = document.createElement('option'); opt.value = y; opt.innerText = y; if(y === currY) opt.selected = true; ySel.appendChild(opt); }
            document.getElementById('watermark').innerText = `SYS.${currY}`;
        }

        function changeDate() { currM = parseInt(document.getElementById('month-select').value); currY = parseInt(document.getElementById('year-select').value); renderDateSelectors(); renderTable(); }

        function renderTable() {
            const head = document.getElementById('thead'); head.innerHTML = `<th class="sticky-col">${TRANSLATIONS[currentLang].day}</th>`;
            targets.forEach(t => head.innerHTML += `<th>${t.ico}<br>${t.lab}</th>`);
            const body = document.getElementById('tbody'); body.innerHTML = "";
            const daysCount = new Date(currY, currM + 1, 0).getDate();
            let weeklySums = {}; targets.forEach(t => weeklySums[t.id] = 0);
            
            for (let d = 1; d <= daysCount; d++) {
                const date = new Date(currY, currM, d);
                const tr = document.createElement('tr'); tr.id = `day-row-${d}`;
                if(new Date().getDate() === d && new Date().getMonth() === currM && new Date().getFullYear() === currY) tr.style.background = "var(--primary-glow)";

                const hasNote = localStorage.getItem(`n${getShortY()}_${currM}_${d}`) ? 'has-note' : '';
                let html = `<td class="sticky-col ${hasNote}" onclick="openNoteModal(${d})">${d.toString().padStart(2,'0')}<span>${date.toLocaleDateString(currentLang==='pl'?'pl-PL':'en-US', {weekday:'short'}).toUpperCase()}</span><div class="note-dot"></div></td>`;
                
                targets.forEach(t => {
                    const isChecked = localStorage.getItem(`c${getShortY()}_${currM}_${d}_${t.id}`) === '1';
                    if (isChecked) weeklySums[t.id]++;
                    html += `<td><input type="checkbox" ${isChecked ? 'checked' : ''} class="type-${t.type}" onchange="handleCheck(${d},'${t.id}',this.checked, '${t.type}')"></td>`;
                });
                tr.innerHTML = html; body.appendChild(tr);

                if (date.getDay() === 0 || d === daysCount) {
                    const sep = document.createElement('tr'); sep.className = "weekly-row";
                    let sumHtml = `<td class="sticky-col" style="background: var(--week-bg) !important;">W${Math.ceil(d/7)}</td>`;
                    targets.forEach(t => { sumHtml += `<td style="${(t.type==='bad'&&weeklySums[t.id]>1)?'color:var(--bad)':''}">${weeklySums[t.id]>0?weeklySums[t.id]:'-'}</td>`; weeklySums[t.id]=0; });
                    sep.innerHTML = sumHtml; body.appendChild(sep);
                }
            }
            updateEngine();
        }

        function handleCheck(d, id, val, type) { const key = `c${getShortY()}_${currM}_${d}_${id}`; val ? localStorage.setItem(key, '1') : localStorage.removeItem(key); updateEngine(); }

        function updateEngine() {
            const area = document.getElementById('stats-area'); area.innerHTML = "";
            const daysCount = new Date(currY, currM + 1, 0).getDate();
            let totalGood = 0; let totalDone = 0; globalExp = 0; 
            
            // Calc global EXP across all years/months
            for (let i = 0; i < localStorage.length; i++) {
                const k = localStorage.key(i);
                if (k.startsWith('c') && localStorage.getItem(k) === '1') {
                    const trg = targets.find(t => t.id === k.split('_')[3]);
                    if(trg && trg.type === 'good') globalExp++;
                }
            }
            const lvl = Math.floor(globalExp / 10) + 1;
            document.getElementById('sys-lvl').innerText = lvl.toString().padStart(2, '0');

            targets.forEach(t => {
                let count = 0; let streak = 0; let maxStreak = 0;
                for(let d=1; d<=daysCount; d++) { if(localStorage.getItem(`c${getShortY()}_${currM}_${d}_${t.id}`)) { count++; streak++; if(streak>maxStreak) maxStreak=streak; } else { streak=0; } }
                if (t.type === 'good') { totalGood += daysCount; totalDone += count; }
                const isBadLimit = t.type === 'bad' && count > 4;
                const card = document.createElement('div'); card.className = `stat-card ${maxStreak>=3&&t.type==='good'?'active-streak':''}`; card.style.borderBottomColor = isBadLimit?'var(--bad)':'';
                card.innerHTML = `<span class="stat-val" style="color:${isBadLimit?'var(--bad)':(t.type==='tracker'?'var(--tracker)':'var(--text)')}">${(t.type==='bad'?(4-count):count).toString().padStart(2,'0')}</span><span class="stat-label">${t.type==='bad'?'LIMIT':t.lab}</span>${maxStreak>=3&&t.type==='good'?`<div class="streak-fire">COMBO x${maxStreak}</div>`:''}`;
                area.appendChild(card);
            });
            document.getElementById('month-progress').style.width = `${totalGood===0?0:Math.round((totalDone/totalGood)*100)}%`;
        }

        function openProfile() {
            document.getElementById('heatmap-year').innerText = currY;
            const grid = document.getElementById('heatmap-container'); grid.innerHTML = '';
            const daysInYear = (currY % 4 === 0 && currY % 100 !== 0) || currY % 400 === 0 ? 366 : 365;
            let d = new Date(currY, 0, 1);
            
            for(let i=0; i<daysInYear; i++) {
                let m = d.getMonth(); let day = d.getDate(); let score = 0;
                targets.filter(t=>t.type==='good').forEach(t => { if(localStorage.getItem(`c${getShortY()}_${m}_${day}_${t.id}`) === '1') score++; });
                let box = document.createElement('div'); box.className = 'heat-box';
                if(score > 0 && score <= 2) box.classList.add('heat-lvl-1');
                else if(score > 2 && score <= 4) box.classList.add('heat-lvl-2');
                else if(score > 4) box.classList.add('heat-lvl-3');
                grid.appendChild(box); d.setDate(d.getDate() + 1);
            }

            const badgesArea = document.getElementById('badges-container'); badgesArea.innerHTML = '';
            const lvl = Math.floor(globalExp / 10) + 1;
            BADGES_DEF.forEach(b => {
                const unlocked = lvl >= b.reqLvl;
                badgesArea.innerHTML += `<div class="badge-row ${unlocked ? 'unlocked' : ''}"><div class="badge-ico">${b.ico}</div><div><div class="badge-title">${currentLang==='pl'?b.namePL:b.nameEN}</div><div class="badge-desc">${currentLang==='pl'?b.descPL:b.descEN} (LVL ${b.reqLvl})</div></div></div>`;
            });

            document.getElementById('modal-profile').style.display = 'flex';
        }

        function openNoteModal(d) { activeNoteKey = `n${getShortY()}_${currM}_${d}`; document.getElementById('note-input').value = localStorage.getItem(activeNoteKey) || ""; document.getElementById('modal-note').style.display = 'flex'; }
        function saveNote() { const v = document.getElementById('note-input').value.trim(); v ? localStorage.setItem(activeNoteKey, v) : localStorage.removeItem(activeNoteKey); closeModal('modal-note'); renderTable(); triggerToast(TRANSLATIONS[currentLang].saved); }
        function openSettings() { const editor = document.getElementById('targets-editor'); editor.innerHTML = ""; targets.forEach(t => addTargetRow(editor, t.id, t.ico, t.lab, t.type)); document.getElementById('modal-settings').style.display = 'flex'; }
        function addTargetRow(c, id, ico, lab, type) { const div = document.createElement('div'); div.dataset.id = id||Date.now(); div.style.display="flex"; div.style.gap="5px"; div.style.marginBottom="10px"; div.innerHTML = `<input type="text" value="${ico||''}" style="width:45px;text-align:center;margin:0;"><input type="text" value="${lab||''}" style="flex:1;margin:0;"><select class="form-select" style="width:auto;margin:0;padding:5px;height:41px;"><option value="good" ${type==='good'?'selected':''}>+</option><option value="bad" ${type==='bad'?'selected':''}>-</option><option value="tracker" ${type==='tracker'?'selected':''}>Log</option></select><button class="btn-icon" style="color:var(--bad);padding:5px 12px;margin:0;border-color:var(--bad);" onclick="this.parentElement.remove()">X</button>`; c.appendChild(div); }
        function addNewTargetField() { addTargetRow(document.getElementById('targets-editor'), '', '⚡', '', 'good'); }
        function saveTargets() { const rows = document.getElementById('targets-editor').children; const nT = []; for(let r of rows) { const inputs = r.querySelectorAll('input, select'); if(inputs[0].value && inputs[1].value) nT.push({id: r.dataset.id, ico: inputs[0].value, lab: inputs[1].value, type: inputs[2].value}); } targets = nT; localStorage.setItem('cfg_targets_26_clean', JSON.stringify(targets)); closeModal('modal-settings'); renderTable(); triggerToast(TRANSLATIONS[currentLang].saved); }
        function scrollToToday() { const el = document.getElementById(`day-row-${new Date().getDate()}`); if(el) document.getElementById('main-scroll').scrollTop = el.offsetTop - 100; }
        function triggerToast(txt) { const t = document.getElementById('toast'); t.innerText = txt; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 2500); }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
        
        function exportData() { const d = {}; for(let i=0; i<localStorage.length; i++) { const k = localStorage.key(i); if(k.includes('_')) d[k] = localStorage.getItem(k); } const a = document.createElement("a"); a.href = URL.createObjectURL(new Blob([JSON.stringify(d)], {type:"application/json"})); a.download = `hud_backup.json`; a.click(); }
        function exportCSV() { let csv = "Rok,Miesiac,Dzien,Typ,ID_Celu,Wartosc\n"; for(let i=0; i<localStorage.length; i++) { const k=localStorage.key(i); if(k.startsWith('c')||k.startsWith('n')) { const p=k.split('_'); if(p.length>=3) { const t=k.startsWith('c')?"Wektor":"Notatka"; let w=localStorage.getItem(k); if(w.includes(','))w=`"${w}"`; csv+=`20${p[0].substring(1)},${parseInt(p[1])+1},${p[2]},${t},${p[3]||"LOG"},${w}\n`; } } } const a = document.createElement("a"); a.href = URL.createObjectURL(new Blob([csv], {type:"text/csv"})); a.download = `hud_dane.csv`; a.click(); }
        function importData(e) { const r = new FileReader(); r.onload = function(ev) { const d = JSON.parse(ev.target.result); Object.keys(d).forEach(k => localStorage.setItem(k, d[k])); location.reload(); }; r.readAsText(e.target.files[0]); }

        boot();
    </script>
</body>
</html>
