<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DAILY_HUD | Taktyczny Planer Przetrwania v3.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Audiowide&family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <link rel="manifest" href="manifest.json">
    
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="apple-touch-icon" href="logo.png">
    
    <meta property="og:title" content="DAILY_HUD | Taktyczny Planer Przetrwania">
    <meta property="og:description" content="Minimalistyczny, taktyczny planer dla zabieganych rodziców. Ogarnij codzienność jak misję wojskową. Darmowy, bezpieczny, offline.">
    <meta property="og:image" content="logo.png">


    <style>
        :root {
            --bg: #f0f4f8; /* Jasne, świeże tło */
            --card: #ffffff; /* Białe karty */
            --primary: #008080; /* Profesjonalny turkus (Teal) */
            --primary-glow: rgba(0, 128, 128, 0.2);
            --text: #1a2b3c; /* Ciemny, czytelny tekst */
            --text-dim: #7f8c9d; /* Przygaszony tekst */
            --border: #dbe2e8; /* Jasne obramowania */
            --tracker: #8e44ad; /* Fioletowy dla neutralnych logów */
            --bad: #e67e22; /* Ciepły pomarańcz dla limitów */
        }

        body {
            font-family: 'Inter', sans-serif; background-color: var(--bg); color: var(--text);
            margin: 0; padding: 12px; min-height: 100vh; -webkit-font-smoothing: antialiased;
        }

        body::before {
            content: " "; display: block; position: fixed; top: 0; left: 0; bottom: 0; right: 0;
            background-image: linear-gradient(0deg, rgba(255,255,255,0.8) 50%, transparent 50%);
            z-index: 9999; background-size: 100% 4px; pointer-events: none; opacity: 0.1;
        }

        #watermark {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) rotate(-20deg);
            font-size: 10vw; font-weight: 900; color: rgba(0, 128, 128, 0.03);
            white-space: nowrap; z-index: -1; pointer-events: none; font-family: 'Audiowide', sans-serif;
        }

        header { padding: 10px 0; display: flex; justify-content: space-between; align-items: flex-end; border-bottom: 2px solid var(--border); margin-bottom: 15px; background: var(--card); padding: 15px; border-radius: 8px;}
        .logo {
            font-family: 'Audiowide', sans-serif; font-size: 1.2rem; letter-spacing: 1px;
            color: var(--primary); text-shadow: 1px 1px 2px rgba(0,0,0,0.1); position: relative;
        }
        
        .logo:active { animation: glitch 0.2s linear infinite; }
        @keyframes glitch {
            0% { transform: translate(0) }
            20% { transform: translate(-1px, 1px) }
            40% { transform: translate(-1px, -1px) }
            60% { transform: translate(1px, 1px) }
            80% { transform: translate(1px, -1px) }
            100% { transform: translate(0) }
        }

        .user-level { text-align: right; }
        .lvl-text { font-family: 'Orbitron'; font-size: 0.7rem; color: var(--text-dim); }
        .lvl-val { font-family: 'Audiowide'; font-size: 1.4rem; color: var(--text); text-shadow: 0 0 5px var(--primary-glow); }

        /* PROGRESS BAR */
        .progress-container {
            width: 100%; background: #e0e6ed; height: 10px; margin-bottom: 15px;
            position: relative; border-radius: 5px; overflow: hidden;
            border: 1px solid var(--border);
        }
        .progress-bar {
            height: 100%; background: var(--primary); width: 0%;
            transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1); box-shadow: 0 0 10px var(--primary-glow);
            position: relative;
        }

        /* TOP ACTIONS */
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; gap: 10px; }
        .btn-action, .btn-icon {
            background: #fff; color: var(--primary); border: 1px solid var(--primary);
            padding: 10px 15px; font-family: 'Orbitron'; font-size: 0.7rem; cursor: pointer; font-weight: 700;
            text-transform: uppercase; transition: 0.2s; border-radius: 5px;
            clip-path: polygon(5px 0, 100% 0, 100% calc(100% - 5px), calc(100% - 5px) 100%, 0 100%, 0 5px);
            box-shadow: 2px 2px 5px rgba(0,0,0,0.05);
        }
        .btn-action:hover, .btn-icon:hover { background: var(--primary); color: #fff; box-shadow: 0 0 10px var(--primary-glow); }
        .btn-action:active { transform: scale(0.95); }

        .tabs { display: flex; overflow-x: auto; gap: 8px; scrollbar-width: none; flex-grow: 1; padding-bottom: 5px; }
        .tabs::-webkit-scrollbar { display: none; }
        .tab-btn {
            background: var(--card); border: 1px solid var(--border); padding: 8px 16px;
            color: var(--text-dim); font-size: 0.65rem; text-transform: uppercase;
            cursor: pointer; transition: 0.3s; white-space: nowrap; font-family: 'Orbitron';
            border-radius: 5px;
            clip-path: polygon(5px 0, 100% 0, 100% calc(100% - 5px), calc(100% - 5px) 100%, 0 100%, 0 5px);
        }
        .tab-btn.active { border-color: var(--primary); color: var(--primary); background: #fff; box-shadow: 2px 2px 8px rgba(0,128,128,0.1); }

        /* TABLE */
        .table-container { 
            background: var(--card); border: 1px solid var(--border); position: relative; 
            max-height: 55vh; overflow: hidden; display: flex; flex-direction: column;
            border-radius: 8px; box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            clip-path: polygon(0 0, 100% 0, 100% calc(100% - 10px), calc(100% - 10px) 100%, 0 100%);
        }
        .scroll-area { overflow: auto; scroll-behavior: smooth; flex-grow: 1;}
        table { width: 100%; border-collapse: collapse; min-width: 650px; }

        th {
            background: #f8fafc; padding: 15px 5px; font-size: 0.6rem; color: var(--text-dim);
            text-transform: uppercase; letter-spacing: 1px; border-bottom: 2px solid var(--border);
            position: sticky; top: 0; z-index: 5; font-family: 'Orbitron';
        }

        td { padding: 12px 5px; border-bottom: 1px solid #edf2f7; text-align: center; transition: background 0.2s;}
        tr:hover td { background: #f1f5f9; }

        .sticky-col {
            position: sticky; left: 0; background: var(--card) !important; border-right: 1px solid var(--border) !important;
            font-family: 'Orbitron'; font-weight: 700; color: var(--text); font-size: 0.9rem; min-width: 45px; z-index: 6;
        }
        th.sticky-col { z-index: 10; background: #f8fafc !important; color: var(--primary);} 
        .sticky-col span { font-size: 0.45rem; color: var(--primary); display: block; font-family: 'Inter'; letter-spacing: 1px;}

        .weekly-row { background: #e6f7f7 !important; font-size: 0.6rem; color: var(--text); font-weight: 800; font-family: 'Orbitron'; }
        .weekly-row td { padding: 8px; border-top: 1px solid var(--primary); border-bottom: 1px solid var(--primary); color: var(--primary); }

        /* CHECKBOXES (CLEAN STYLE) */
        input[type="checkbox"] {
            appearance: none; width: 26px; height: 26px; border: 2px solid #cbd5e1;
            background: #fff; cursor: pointer; position: relative; transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            border-radius: 6px;
            clip-path: polygon(3px 0, 100% 0, 100% calc(100% - 3px), calc(100% - 3px) 100%, 0 100%, 0 3px);
        }
        input[type="checkbox"]:active { transform: scale(0.85); }
        input[type="checkbox"]:checked { background: var(--primary); border-color: var(--primary); box-shadow: 0 3px 8px var(--primary-glow); }
        input[type="checkbox"]:checked::after { content: "✓"; color: #fff; position: absolute; left: 7px; top: 3px; font-weight: 900; font-size: 16px; }
        
        .type-bad:checked { background: var(--bad); border-color: var(--bad); box-shadow: 0 3px 8px rgba(230,126,34,0.3); }
        .type-tracker:checked { background: var(--tracker); border-color: var(--tracker); box-shadow: 0 3px 8px rgba(142,68,173,0.3); }
        .type-tracker:checked::after { content: "■"; color: #fff; font-size: 12px; left: 8px; top: 7px;}

        /* STATS HUD (CLEAN) */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(90px, 1fr)); gap: 12px; margin-top: 15px; }
        .stat-card { 
            background: var(--card); border: 1px solid var(--border); padding: 15px 5px; text-align: center; 
            clip-path: polygon(8px 0, 100% 0, 100% calc(100% - 8px), calc(100% - 8px) 100%, 0 100%, 0 8px);
            border-bottom: 3px solid #cbd5e1; transition: 0.3s; border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.02);
        }
        .stat-card.active-streak { border-bottom-color: var(--primary); box-shadow: 0 5px 15px rgba(0,128,128,0.1); }
        .stat-val { font-family: 'Audiowide'; font-size: 1.4rem; display: block; color: var(--text);}
        .stat-label { font-size: 0.45rem; color: var(--text-dim); text-transform: uppercase; margin-top: 8px; display: block; font-family: 'Orbitron'; letter-spacing: 1px;}
        .streak-fire { color: var(--primary); font-size: 0.6rem; margin-top: 5px; font-weight: 800; }

        /* MODALS */
        .modal { display: none; position: fixed; inset: 0; background: rgba(26,43,60,0.6); z-index: 10000; padding: 15px; align-items: center; justify-content: center; backdrop-filter: blur(3px);}
        .modal-box { 
            background: var(--card); border: 1px solid var(--border); padding: 25px; width: 100%; max-width: 450px; max-height: 90vh; overflow-y: auto;
            clip-path: polygon(15px 0, 100% 0, 100% calc(100% - 15px), calc(100% - 15px) 100%, 0 100%, 0 15px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.1); border-radius: 10px;
        }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px solid var(--border); padding-bottom: 15px;}
        .modal-title { margin: 0; font-family: 'Audiowide'; color: var(--primary); font-size: 1rem; letter-spacing: 1px;}
        .close-btn { background: none; border: none; color: var(--text-dim); font-size: 1.5rem; cursor: pointer; font-family: 'Orbitron'; }
        .close-btn:hover { color: var(--primary); }
        
        textarea, input[type="text"], select { 
            width: 100%; box-sizing: border-box; background: #f8fafc; color: var(--text); border: 1px solid var(--border); 
            padding: 12px; margin-bottom: 15px; outline: none; font-family: 'Orbitron'; font-size: 0.8rem; border-radius: 5px;
        }
        textarea:focus, input[type="text"]:focus { border-color: var(--primary); background: #fff; box-shadow: 0 0 10px var(--primary-glow); }
        textarea { height: 120px; resize: vertical; }

        /* Toast / Alert */
        #toast {
            position: fixed; bottom: -100px; left: 50%; transform: translateX(-50%);
            background: var(--primary); color: #fff; padding: 15px 30px; 
            font-family: 'Audiowide'; font-size: 0.8rem; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); z-index: 9999; 
            clip-path: polygon(10px 0, 100% 0, 100% calc(100% - 10px), calc(100% - 10px) 100%, 0 100%, 0 10px);
            box-shadow: 0 10px 25px rgba(0,128,128,0.2); border-radius: 5px;
        }
        #toast.show { bottom: 30px; }

        .note-dot { width: 6px; height: 6px; background: var(--primary); margin: 3px auto 0; display: none; box-shadow: 0 0 5px var(--primary-glow); clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%);}
        .has-note .note-dot { display: block; }
    </style>
</head>
<body>

    <div id="watermark">SYS.2026</div>

    <header>
        <div class="logo">DAILY_HUD <br><span style="font-size: 0.5rem; color: var(--text-dim); font-family: 'Orbitron'">v3.0.CLEAN</span></div>
        <div class="user-level">
            <div class="lvl-text">SYSTEM LEVEL</div>
            <div class="lvl-val" id="sys-lvl">01</div>
        </div>
    </header>

    <div class="progress-container" title="Wydajność Systemu">
        <div class="progress-bar" id="month-progress"></div>
    </div>

    <div class="top-bar">
        <button class="btn-icon" onclick="openSettings()">[ KONFIG_SYS ]</button>
        <div class="tabs" id="month-tabs"></div>
        <button class="btn-action" onclick="scrollToToday()">SYNC_DZISIAJ</button>
    </div>

    <div class="table-container">
        <div class="scroll-area" id="main-scroll">
            <table>
                <thead><tr id="thead"></tr></thead>
                <tbody id="tbody"></tbody>
            </table>
        </div>
    </div>

    <div class="stats-grid" id="stats-area"></div>

    <div id="toast">SYSTEM ZAINICJOWANY</div>

    <div id="modal-note" class="modal">
        <div class="modal-box">
            <div class="modal-header">
                <h3 class="modal-title" id="note-modal-title">RAPORT DZIENNY</h3>
                <button class="close-btn" onclick="closeModal('modal-note')">×</button>
            </div>
            <textarea id="note-input" placeholder="Wprowadź dane taktyczne z dzisiaj..."></textarea>
            <button class="btn-action" style="width:100%; padding:15px;" onclick="saveNote()">ZATWIERDŹ LOG</button>
        </div>
    </div>

    <div id="modal-settings" class="modal">
        <div class="modal-box">
            <div class="modal-header">
                <h3 class="modal-title">KONFIGURACJA ZADAŃ</h3>
                <button class="close-btn" onclick="closeModal('modal-settings')">×</button>
            </div>
            <div id="targets-editor"></div>
            <button class="btn-icon" style="width:100%; margin-bottom: 20px; border-style: dashed;" onclick="addNewTargetField()">+ DODAJ WEKTOR</button>
            <button class="btn-action" style="width:100%; padding:15px;" onclick="saveTargets()">ZAPISZ PROTOKÓŁ</button>

            <div class="modal-header" style="margin-top: 30px;">
                <h3 class="modal-title">BAZA DANYCH</h3>
            </div>
            <div style="display: flex; gap: 10px;">
                <button class="btn-icon" style="flex:1;" onclick="exportData()">EKSPORT</button>
                <button class="btn-icon" style="flex:1;" onclick="document.getElementById('import-file').click()">IMPORT</button>
                <input type="file" id="import-file" style="display:none" accept=".json" onchange="importData(event)">
            </div>
        </div>
    </div>

    <script>
        // Zachowano funkcjonalność Audio dla "satysfakcji" z kliknięcia
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        function playSciFiSound(type) {
            try {
                if(audioCtx.state === 'suspended') audioCtx.resume();
                const osc = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                osc.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                
                if(type === 'good') { 
                    osc.type = 'sine'; // Czystszy dźwięk
                    osc.frequency.setValueAtTime(800, audioCtx.currentTime); 
                    osc.frequency.exponentialRampToValueAtTime(1200, audioCtx.currentTime + 0.05); 
                } else if(type === 'bad') { 
                    osc.type = 'triangle'; // Mniej agresywny
                    osc.frequency.setValueAtTime(300, audioCtx.currentTime); 
                    osc.frequency.exponentialRampToValueAtTime(150, audioCtx.currentTime + 0.1); 
                } else { 
                    osc.type = 'sine'; 
                    osc.frequency.setValueAtTime(600, audioCtx.currentTime); 
                }
                
                gainNode.gain.setValueAtTime(0.02, audioCtx.currentTime); // Cichszy dźwięk
                gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);
                
                osc.start(); osc.stop(audioCtx.currentTime + 0.12);
            } catch(e) {} 
        }

        const DEFAULT_TARGETS = [
            { id: 'tr', ico: '🏋️', lab: 'Trening', type: 'good' },
            { id: 'wo', ico: '💧', lab: 'Woda', type: 'good' },
            { id: 'su', ico: '💊', lab: 'Suple', type: 'good' },
            { id: 'ro', ico: '📚', lab: 'Rozwój', type: 'good' },
            { id: 'cy', ico: '🩺', lab: 'Zdrowie', type: 'tracker' }, // Neutralny (np. Cykl, Migrena)
            { id: 'uz', ico: '🍺', lab: 'Zło', type: 'bad' }
        ];

        const MONTHS = ["Styczeń", "Luty", "Marzec", "Kwiecień", "Maj", "Czerwiec", "Lipiec", "Sierpień", "Wrzesień", "Październik", "Listopad", "Grudzień"];

        let targets = [];
        let currM = new Date().getMonth();
        let activeNoteKey = "";

        function boot() {
            loadTargets();
            renderTabs();
            renderTable();
            if(new Date().getMonth() === currM) setTimeout(scrollToToday, 500);
            setTimeout(() => triggerToast("SYSTEM GOTOWY"), 500);
        }

        function loadTargets() {
            const saved = localStorage.getItem('cfg_targets_26_clean');
            if (saved) { try { targets = JSON.parse(saved); } catch(e) { targets = [...DEFAULT_TARGETS]; } } 
            else { targets = [...DEFAULT_TARGETS]; }
        }

        function renderTabs() {
            const tabs = document.getElementById('month-tabs');
            tabs.innerHTML = "";
            MONTHS.forEach((m, i) => {
                const btn = document.createElement('button');
                btn.className = `tab-btn ${i === currM ? 'active' : ''}`;
                btn.innerText = `M${(i+1).toString().padStart(2, '0')}`;
                btn.onclick = () => { currM = i; renderTabs(); renderTable(); };
                tabs.appendChild(btn);
            });
        }

        function renderTable() {
            const head = document.getElementById('thead');
            head.innerHTML = '<th class="sticky-col">Dzień</th>';
            targets.forEach(t => head.innerHTML += `<th>${t.ico}<br>${t.lab}</th>`);

            const body = document.getElementById('tbody');
            body.innerHTML = "";
            const daysCount = new Date(2026, currM + 1, 0).getDate();
            let weeklySums = {}; targets.forEach(t => weeklySums[t.id] = 0);

            for (let d = 1; d <= daysCount; d++) {
                const date = new Date(2026, currM, d);
                const tr = document.createElement('tr');
                tr.id = `day-row-${d}`;
                
                const isToday = (new Date().getDate() === d && new Date().getMonth() === currM && new Date().getFullYear() === 2026);
                if(isToday) tr.style.background = "#ffffe0"; // Delikatny żółty dla dzisiaj

                const noteKey = `n26_${currM}_${d}`;
                const hasNote = localStorage.getItem(noteKey) ? 'has-note' : '';

                let html = `<td class="sticky-col ${hasNote}" onclick="openNoteModal(${d})">${d.toString().padStart(2,'0')}<span>${date.toLocaleDateString('pl',{weekday:'short'}).toUpperCase()}</span><div class="note-dot"></div></td>`;
                
                targets.forEach(t => {
                    const key = `c26_${currM}_${d}_${t.id}`;
                    const isChecked = localStorage.getItem(key) === '1';
                    if (isChecked) weeklySums[t.id]++;
                    
                    const chkClass = `type-${t.type}`;
                    html += `<td><input type="checkbox" ${isChecked ? 'checked' : ''} class="${chkClass}" onchange="handleCheck(${d},'${t.id}',this.checked, '${t.type}')"></td>`;
                });

                tr.innerHTML = html;
                body.appendChild(tr);

                if (date.getDay() === 0 || d === daysCount) {
                    const sep = document.createElement('tr');
                    sep.className = "weekly-row";
                    let sumHtml = `<td class="sticky-col" style="background: #e6f7f7 !important;">W${Math.ceil(d/7)}</td>`;
                    
                    targets.forEach(t => {
                        let displayVal = weeklySums[t.id];
                        let color = "";
                        if(t.type === 'bad' && displayVal > 1) color = "color: var(--bad);";
                        if(t.type === 'tracker') color = "color: var(--tracker);";
                        sumHtml += `<td style="${color}">${displayVal > 0 ? displayVal : '-'}</td>`;
                        weeklySums[t.id] = 0; 
                    });
                    
                    sep.innerHTML = sumHtml;
                    body.appendChild(sep);
                }
            }
            updateEngine();
        }

        function handleCheck(d, id, val, type) {
            playSciFiSound(val ? type : 'tracker'); 
            const key = `c26_${currM}_${d}_${id}`;
            val ? localStorage.setItem(key, '1') : localStorage.removeItem(key);
            
            if (val && type === 'good') {
                let goodDone = 0;
                let totalGood = targets.filter(t => t.type === 'good').length;
                targets.filter(t => t.type === 'good').forEach(t => { if(localStorage.getItem(`c26_${currM}_${d}_${t.id}`)) goodDone++; });
                if(goodDone === totalGood && totalGood > 0) triggerToast("CEL OSIĄGNIĘTY 🎯");
            }
            updateEngine();
        }

        function updateEngine() {
            const area = document.getElementById('stats-area');
            area.innerHTML = "";
            const daysCount = new Date(2026, currM + 1, 0).getDate();
            
            let totalGoodPossible = 0; let totalGoodCompleted = 0;
            let globalExp = 0; 

            for (let i = 0; i < localStorage.length; i++) {
                const key = localStorage.key(i);
                if (key.startsWith('c26_') && localStorage.getItem(key) === '1') {
                    const targetId = key.split('_')[3];
                    const trg = targets.find(t => t.id === targetId);
                    if(trg && trg.type === 'good') globalExp++;
                }
            }
            
            const level = Math.floor(globalExp / 10) + 1;
            document.getElementById('sys-lvl').innerText = level.toString().padStart(2, '0');

            targets.forEach(t => {
                let count = 0; let streak = 0; let maxStreak = 0;

                for(let d=1; d<=daysCount; d++) {
                    if(localStorage.getItem(`c26_${currM}_${d}_${t.id}`)) {
                        count++; streak++;
                        if(streak > maxStreak) maxStreak = streak;
                    } else { streak = 0; }
                }

                if (t.type === 'good') { totalGoodPossible += daysCount; totalGoodCompleted += count; }

                const isBadLimit = t.type === 'bad' && count > 4;
                const card = document.createElement('div');
                card.className = `stat-card ${maxStreak >= 3 && t.type === 'good' ? 'active-streak' : ''}`;
                card.style.borderBottomColor = isBadLimit ? 'var(--bad)' : '';
                
                let valColor = "var(--text)";
                if (isBadLimit) valColor = "var(--bad)";
                if (t.type === 'tracker') valColor = "var(--tracker)";

                let displayVal = t.type === 'bad' ? (4 - count) : count;

                card.innerHTML = `
                    <span class="stat-val" style="color:${valColor}">${displayVal.toString().padStart(2,'0')}</span>
                    <span class="stat-label">${t.type === 'bad' ? 'LIMIT' : t.lab}</span>
                    ${maxStreak >= 3 && t.type === 'good' ? `<div class="streak-fire">COMBO x${maxStreak}</div>` : ''}
                `;
                area.appendChild(card);
            });

            const progress = totalGoodPossible === 0 ? 0 : Math.round((totalGoodCompleted / totalGoodPossible) * 100);
            document.getElementById('month-progress').style.width = `${progress}%`;
        }

        function openNoteModal(d) {
            activeNoteKey = `n26_${currM}_${d}`;
            document.getElementById('note-modal-title').innerText = `LOG DZIEŃ: ${d.toString().padStart(2,'0')}/${(currM+1).toString().padStart(2,'0')}`;
            document.getElementById('note-input').value = localStorage.getItem(activeNoteKey) || "";
            document.getElementById('modal-note').style.display = 'flex';
        }

        function saveNote() {
            const v = document.getElementById('note-input').value.trim();
            v ? localStorage.setItem(activeNoteKey, v) : localStorage.removeItem(activeNoteKey);
            closeModal('modal-note'); renderTable(); triggerToast("LOG ZAPISANY");
        }

        function openSettings() {
            const editor = document.getElementById('targets-editor');
            editor.innerHTML = "";
            targets.forEach(t => addTargetRow(editor, t.id, t.ico, t.lab, t.type));
            document.getElementById('modal-settings').style.display = 'flex';
        }

        function addTargetRow(container, id, ico, lab, type) {
            const div = document.createElement('div');
            div.dataset.id = id || `t_${Date.now()}`;
            div.style.display = "flex"; div.style.gap = "5px"; div.style.marginBottom = "10px";
            div.innerHTML = `
                <input type="text" value="${ico||''}" style="width: 45px; text-align:center; margin:0;" placeholder="Iko">
                <input type="text" value="${lab||''}" style="flex:1; margin:0;" placeholder="Cel">
                <select style="width: auto; margin:0; padding:5px; height: 41px;">
                    <option value="good" ${type==='good'?'selected':''}>Cel (+)</option>
                    <option value="bad" ${type==='bad'?'selected':''}>Limit (-)</option>
                    <option value="tracker" ${type==='tracker'?'selected':''}>Log</option>
                </select>
                <button class="btn-icon" style="color:var(--bad); padding: 5px 12px; margin:0; border-color: var(--bad);" onclick="this.parentElement.remove()">X</button>
            `;
            container.appendChild(div);
        }

        function addNewTargetField() { addTargetRow(document.getElementById('targets-editor'), '', '⚡', 'Nowy', 'good'); }

        function saveTargets() {
            const rows = document.getElementById('targets-editor').children;
            const newTargets = [];
            for(let r of rows) {
                const inputs = r.querySelectorAll('input, select');
                if(inputs[0].value && inputs[1].value) {
                    newTargets.push({ id: r.dataset.id, ico: inputs[0].value, lab: inputs[1].value, type: inputs[2].value });
                }
            }
            if(newTargets.length === 0) return triggerToast("BŁĄD: PUSTE CELE");
            targets = newTargets;
            localStorage.setItem('cfg_targets_26_clean', JSON.stringify(targets));
            closeModal('modal-settings'); renderTable(); triggerToast("KONFIGURACJA ZAPISANA");
        }

        function scrollToToday() {
            const d = new Date().getDate();
            const el = document.getElementById(`day-row-${d}`);
            if(el) {
                const container = document.getElementById('main-scroll');
                container.scrollTop = el.offsetTop - (container.offsetHeight / 2);
            }
        }

        function triggerToast(txt) {
            const t = document.getElementById('toast');
            t.innerText = txt; t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 2500);
        }

        function closeModal(id) { document.getElementById(id).style.display = 'none'; }

        function exportData() {
            const data = {};
            for (let i = 0; i < localStorage.length; i++) {
                const key = localStorage.key(i);
                if (key.includes('26')) data[key] = localStorage.getItem(key);
            }
            const blob = new Blob([JSON.stringify(data)], { type: "application/json" });
            const a = document.createElement("a"); a.href = URL.createObjectURL(blob);
            a.download = `planer_backup_${new Date().toISOString().split('T')[0]}.json`;
            a.click(); triggerToast("EKSPORT ZAKOŃCZONY");
        }

        function importData(event) {
            const file = event.target.files[0]; if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const data = JSON.parse(e.target.result);
                    Object.keys(data).forEach(k => localStorage.setItem(k, data[k]));
                    closeModal('modal-settings'); boot(); triggerToast("DANE ZAIMPORTOWANE");
                } catch(err) { triggerToast("CRITICAL ERROR: ZŁY PLIK"); }
            };
            reader.readAsText(file); event.target.value = ""; 
        }

        boot();
    </script>
    
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('Silnik Offline Aktywny!'))
                    .catch(err => console.error('Błąd silnika:', err));
            });
        }
    </script>
</body>
</html>
